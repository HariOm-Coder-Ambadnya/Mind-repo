spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/mindrepo}
    username: ${DB_USER:mindrepo}
    password: ${DB_PASS:mindrepo_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user,user:email
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-min-32-chars-change-in-prod}
    expiration-ms: 86400000
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  api-url: ${API_URL:http://localhost:8080}

server:
  port: 8080
